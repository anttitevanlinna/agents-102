<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTO C1 · The closed loop</title>
<style>
  body{margin:0;background:#f4eee0;font-family:ui-monospace,Menlo,Consolas,monospace;}
  .wrap{max-width:1240px;margin:0 auto;padding:18px 20px 40px;}
  .hd{background:#1f1a13;color:#efe6d2;font-size:11px;letter-spacing:1px;padding:9px 14px;border-radius:4px;margin-bottom:14px;display:flex;gap:16px;align-items:baseline;flex-wrap:wrap;}
  .hd .id{color:#c97942;letter-spacing:3px;white-space:nowrap;}
  .hd .nm{white-space:nowrap;}
  .hd .st{color:#a99d85;font-family:Inter,-apple-system,sans-serif;letter-spacing:0;font-size:11.5px;}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
  <span class="id">PROTO C1</span>
  <span class="nm">THE CLOSED LOOP · CANONICAL FORM</span>
  <span class="st">The textbook closed-loop diagram, relabeled: spec=reference, you+Claude+rules=controller, the run=plant, tests/eval=measurement, the gap=error. Student words on the canvas; the field's names live here in the frame.</span>
</div>
<svg viewBox="0 0 1200 560" role="img" aria-label="A closed-loop diagram in the student's words. Along the top, left to right: THE SPEC feeds a summing junction THE GAP, into a block YOU CLAUDE RULES, into a block THE AGENT RUN, out to an ochre target THE CHANGE. A grey disturbance arrow drift rot stale rules drops into THE AGENT RUN from above. A teal feedback path returns from THE CHANGE down and left through a measurement block TESTS DIFF EVAL and back up into the junction, labelled THE GAP FED BACK. Two brackets group the forward blocks as SHAPE BEFORE IT MOVES feedforward and the return row as READ AND CORRECT AFTER feedback." style="display:block;width:100%;height:auto;background:#efe6d2;border:1px solid #c5b68d;border-radius:7px;">

  <!-- canvas + neatline -->
  <rect x="0.5" y="0.5" width="1199" height="559" rx="7" fill="#efe6d2"/>
  <rect x="12" y="12" width="1176" height="536" fill="none" stroke="#d6c8a3" stroke-width="1" opacity="0.9"/>
  <!-- faint engineering guides -->
  <g stroke="#d6c8a3" stroke-width="0.6" opacity="0.4">
    <line x1="12" y1="190" x2="1188" y2="190" stroke-dasharray="2 8"/>
    <line x1="12" y1="355" x2="1188" y2="355" stroke-dasharray="2 8"/>
  </g>

  <!-- ================= FEEDBACK RETURN (far half) ================= -->
  <g fill="none" stroke="#2f6b6b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- right drop from THE CHANGE, left into the measurement block -->
    <path d="M 830 207 L 830 349 Q 830 355 824 355 L 663 355"/>
    <!-- left out of the measurement block, up into the junction -->
    <path d="M 430 355 L 186 355 Q 180 355 180 349 L 180 216"/>
  </g>
  <polygon points="651,355 661,350 661,360" fill="#2f6b6b"/>
  <polygon points="180,205 175,215 185,215" fill="#2f6b6b"/>
  <text x="300" y="343" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2" fill="#2f6b6b" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">THE GAP, FED BACK</text>

  <!-- measurement block -->
  <rect x="430" y="320" width="220" height="70" rx="7" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2.2"/>
  <text x="540" y="351" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#1f1a13">TESTS · DIFF · EVAL</text>
  <text x="540" y="369" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">reads what came back</text>

  <!-- ================= FORWARD ROW (near half) ================= -->
  <!-- arrows -->
  <g stroke="#2f6b6b" stroke-width="2" stroke-linecap="round">
    <line x1="86" y1="190" x2="155" y2="190"/>
    <line x1="197" y1="190" x2="239" y2="190"/>
    <line x1="442" y1="190" x2="499" y2="190"/>
    <line x1="732" y1="190" x2="802" y2="190"/>
  </g>
  <g fill="#2f6b6b">
    <polygon points="165,190 155,185 155,195"/>
    <polygon points="249,190 239,185 239,195"/>
    <polygon points="509,190 499,185 499,195"/>
    <polygon points="812,190 802,185 802,195"/>
  </g>

  <!-- THE SPEC -->
  <circle cx="78" cy="190" r="6" fill="#2f6b6b"/>
  <text x="78" y="158" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#1f1a13" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">THE SPEC</text>
  <text x="78" y="172" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">what done means</text>

  <!-- summing junction: THE GAP -->
  <circle cx="180" cy="190" r="15" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2"/>
  <g stroke="#2f6b6b" stroke-width="1.8" stroke-linecap="round">
    <line x1="172" y1="190" x2="188" y2="190"/>
    <line x1="180" y1="182" x2="180" y2="198"/>
  </g>
  <text x="166" y="249" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#2f6b6b" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">THE GAP</text>
  <text x="166" y="264" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">desired minus actual</text>

  <!-- YOU · CLAUDE · RULES -->
  <rect x="250" y="152" width="190" height="76" rx="7" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2.2"/>
  <text x="345" y="185" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#1f1a13">YOU · CLAUDE · RULES</text>
  <text x="345" y="204" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">decide the next move</text>

  <!-- THE AGENT RUN -->
  <rect x="510" y="152" width="220" height="76" rx="7" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2.2"/>
  <text x="620" y="185" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11.5" letter-spacing="2.5" fill="#1f1a13">THE AGENT RUN</text>
  <text x="620" y="204" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">over the codebase</text>

  <!-- disturbance into THE AGENT RUN -->
  <text x="610" y="108" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9.5" letter-spacing="1.5" fill="#786c56" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">drift · rot · stale rules</text>
  <line x1="610" y1="118" x2="610" y2="150" stroke="#786c56" stroke-width="1.6" stroke-dasharray="4 3" opacity="0.85"/>
  <polygon points="610,151 604,141 616,141" fill="#786c56" opacity="0.9"/>

  <!-- THE CHANGE (ochre target) -->
  <circle cx="830" cy="190" r="17" fill="none" stroke="#a05a2c" stroke-width="2"/>
  <circle cx="830" cy="190" r="10" fill="none" stroke="#c97942" stroke-width="1.6"/>
  <circle cx="830" cy="190" r="4" fill="#a05a2c"/>
  <text x="830" y="148" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2.5" fill="#a05a2c" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">THE CHANGE</text>
  <text x="830" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">what shipped</text>

  <!-- ================= BRACKETS ================= -->
  <!-- feedforward: shape before it moves -->
  <path d="M 250 239 L 250 245 L 486 245 L 490 251 L 494 245 L 730 245 L 730 239" fill="none" stroke="#786c56" stroke-width="1.4"/>
  <text x="490" y="267" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2.5" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">SHAPE BEFORE IT MOVES</text>
  <text x="490" y="281" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#786c56" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">feedforward</text>

  <!-- feedback: read and correct after -->
  <path d="M 430 409 L 430 415 L 626 415 L 630 421 L 634 415 L 830 415 L 830 409" fill="none" stroke="#786c56" stroke-width="1.4"/>
  <text x="630" y="437" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2.5" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">READ AND CORRECT AFTER</text>
  <text x="630" y="451" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#786c56" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">feedback</text>

  <!-- ================= CARTOUCHE ================= -->
  <rect x="42" y="24" width="286" height="74" fill="#efe6d2" stroke="#cbbd98" stroke-width="1"/>
  <rect x="46" y="28" width="278" height="66" fill="none" stroke="#d6c8a3" stroke-width="1"/>
  <text x="58" y="48" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9.5" letter-spacing="3" fill="#8a3a2a">YOUR WORK, AS A LOOP</text>
  <text x="58" y="70" font-family="Roboto Slab, Georgia, serif" font-size="15.5" fill="#1f1a13">The closed loop</text>
  <text x="58" y="88" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">shape · run · read · correct</text>

  <!-- ================= CAPTION ================= -->
  <text x="600" y="520" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">The shape robotics and autopilots have run on for decades.</text>
  <text x="1176" y="540" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" letter-spacing="2" fill="#8a3a2a">ONE LOOP · FOUR MOVES</text>
</svg>
</div>
</body>
</html>
