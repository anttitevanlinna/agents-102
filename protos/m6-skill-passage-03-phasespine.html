<style>

<body>
<div class="wrap">
<div class="hd">
  <span class="id">PROTO M6-03</span>
  <span class="nm">PHASES AS THE SPINE (your steer)</span>
  <span class="st">The five legs named as phases of a run: context, plan, build, verify, ship; gates between them; skills sit inside a phase. Honest caveat: a straight phase chain cannot easily show re-invocation, so the loop rides back as a dashed arc across the chart.</span>
</div>

  </pattern>
</defs>

<rect x="0.5" y="0.5" width="1199" height="559" rx="7" fill="#efe6d2"/>

<text x="1188" y="548" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8" letter-spacing="2" fill="#8a3a2a" opacity="0.7" paint-order="stroke" stroke="#efe6d2" stroke-width="2.5" stroke-linejoin="round">FIVE PHASES, GATE TO GATE · THE LOOP RIDES BACK AS AN ARC</text>
