<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proto 03 · Orienteering course</title>
<style>
  body { margin: 0; background: #faf6ec; font-family: Inter, -apple-system, "Segoe UI", sans-serif; color: #1f1a13; }
  .wrap { max-width: 1240px; margin: 24px auto 48px; padding: 0 20px; }
  header.proto { display: flex; align-items: baseline; gap: 14px; padding: 8px 2px 10px; border-bottom: 1px solid #c5b68d; margin-bottom: 14px; }
  header.proto .id { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 10px; letter-spacing: 3px; color: #a05a2c; }
  header.proto .name { font-family: "Roboto Slab", Georgia, serif; font-size: 15px; color: #1f1a13; white-space: nowrap; }

</head>
<body>
<div class="wrap">
<header class="proto">
  <span class="id">PROTO 03 · ORIENTEERING COURSE</span>
  <span class="name">Control points</span>
  <span class="line">One run drawn as a pre-set course: numbered controls collapse the drift that grows between them; fences sit only on the cliff and the fast water; the runner who skips the controls ends in the ravine.</span>
</header>

<svg viewBox="0 0 1200 560" role="img" aria-label="One agent run drawn as an orienteering course: a start triangle, numbered controls that collapse the growing drift, rust fences along the cliff and the fast water, and an unchecked ghost run drifting through the fence gap into the ravine." style="display:block;width:100%;height:auto;background:#efe6d2;border:1px solid #c5b68d;border-radius:6px;">
<defs>
  <pattern id="oc-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
    <path d="M0,8 L8,0" stroke="#8a3a2a" stroke-width="0.7" stroke-opacity="0.3"/>
  </pattern>
</defs>
<rect x="0.5" y="0.5" width="1199" height="559" rx="7" fill="#efe6d2"/>

<!-- ── terrain: contours + vegetation ─────────────────────────── -->
<g fill="none" stroke="#d6c8a3" stroke-width="1" opacity="0.55">

  <g transform="translate(1030,90)"><path d="M-4,4 L-2,-4 M0,5 L0,-5 M4,4 L2,-4"/></g>

  <text x="478" y="118" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#a05a2c">RAILS</text>
  <text x="478" y="133" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">fast water: cross at the bridge only</text>

  <text x="872" y="376" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#a05a2c">RAILS</text>
  <text x="872" y="391" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">the cliff: no undo below</text>

  <text x="245" y="438" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#786c56">OPEN GROUND</text>
  <text x="245" y="453" font-family="Inter, sans-serif" font-size="11" fill="#786c56">cheap to wander: no fence</text>
