<div class="hd">
  <span class="id">PROTO 02</span>
  <span class="nm">NAUTICAL PASSAGE · DEAD RECKONING</span>
  <span class="st">The error cone is the lesson: where the run might be widens with distance since the last fix; each fix collapses it to a point. Rails fence the reef. The unchecked twin drifts into the rocks.</span>
</div>
