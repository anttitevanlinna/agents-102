<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum — Agents 102</title>
    <link rel="stylesheet" href="layouts/curriculum.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header class="curriculum-header">
        <a href="curriculum.html" class="curriculum-home">Agents 102 — Curriculum</a>
    </header>

    <main>
        <article class="module" id="module-body">Loading…</article>
    </main>

    <script>
        (function () {
            // Training definitions. Bootstrap = the default training (Step 1 of 5).
            // Modules are slug-only — sequence is array position. Reorder by moving entries.
            var TRAININGS = {
                bootstrap: {
                    label: 'Bootstrap',
                    lede: 'Eight modules. The chat-to-systems leap. Build real *agents* on your own company content.',
                    prework: { slug: 'prework', title: 'Prework — do this before Module 1' },
                    modules: [
                        { slug: 'getting-going',           title: 'Getting Going' },
                        { slug: 'building-agent-systems', title: 'Building Agent Systems' },
                        { slug: 'multi-agent-systems',    title: 'Multi-Agent Systems' },
                        { slug: 'security',               title: 'Security' },
                        { slug: 'output-quality',         title: 'Output Quality and Hallucination Control' },
                        { slug: 'evaluations',            title: 'Evaluations' },
                        { slug: 'personal-to-team',       title: 'From Personal to Team' },
                        { slug: 'agents-building-agents', title: 'Agents Building Agents (The Flywheel)' }
                    ],
                    supplementaries: [
                        { slug: 'what-is-an-agent',                      title: 'What is an Agent' },
                        { slug: 'building-guardrails',                   title: 'Building Guardrails (and Skills)' },
                        { slug: 'learning-and-compounding-systems',      title: 'Learning and Compounding Systems' }
                    ],
                    references: [
                        { slug: 'claude-quick-reference',                title: 'Claude quick reference — commands and how-tos' }
                    ]
                },
                'agentic-engineering-101': {
                    label: 'Agentic Engineering 101',
                    lede: 'Six modules for self-taught software engineers using Claude Code. Become the Claude wizard on your own codebase.',
                    prework: { slug: 'prework', title: 'Prework — do this before Module 1' },
                    modules: [
                        { slug: 'ship-with-agents', title: 'Ship with agents' }
                    ]
                }
            };
            var DEFAULT_TRAINING = 'bootstrap';

            var params       = new URLSearchParams(window.location.search);
            var trainingKey  = params.get('training') || DEFAULT_TRAINING;
            var moduleSlug   = params.get('module');
            var directFile   = params.get('file'); // for standalone exercise/lecture viewing
            var container    = document.getElementById('module-body');
            var directFileParent = null; // set by extractParent() if the file declares <!-- parent: <slug> -->

            // Standalone exercise or lecture view: ?file=exercises/raw-llm  or  ?file=lectures/context-is-king
            if (directFile && !moduleSlug) {
                loadAndRender('../curriculum/' + directFile + '.md', directFile);
                return;
            }

            var training = TRAININGS[trainingKey];
            if (!training) {
                container.innerHTML = '<h1>Training not found</h1><p>No training named <code>' + esc(trainingKey) + '</code>. <a href="curriculum.html">Back to index</a>.</p>';
                document.title = 'Training not found — Agents 102';
                return;
            }

            if (!moduleSlug) {
                renderTrainingIndex(training);
                return;
            }

            // Prework page: ?training=bootstrap&prework=1 (or ?module=prework for convenience)
            if (params.get('prework') === '1' || moduleSlug === 'prework') {
                if (training.prework) {
                    loadAndRender('../curriculum/trainings/' + trainingKey + '/' + training.prework.slug + '.md', training.prework.title);
                    return;
                }
            }

            var mod = training.modules.find(function (m) { return m.slug === moduleSlug; });
            if (!mod) {
                container.innerHTML = '<h1>Module not found</h1><p>No module <code>' + esc(moduleSlug) + '</code> in <code>' + esc(trainingKey) + '</code>. <a href="curriculum.html?training=' + trainingKey + '">Back</a>.</p>';
                document.title = 'Module not found — Agents 102';
                return;
            }

            loadAndRender('../curriculum/trainings/' + trainingKey + '/' + mod.slug + '.md', mod.title);

            // ============================================================
            // Core rendering: fetch markdown, expand includes, parse, inject
            // ============================================================
            function loadAndRender(path, fallbackTitle) {
                fetch(path)
                    .then(function (res) {
                        if (!res.ok) throw new Error('Not found: ' + path);
                        return res.text();
                    })
                    .then(extractParent)
                    .then(stripMaintainerTail)
                    .then(expandIncludes)
                    .then(function (md) {
                        container.innerHTML = marked.parse(md);
                        var h1 = container.querySelector('h1');
                        document.title = (h1 ? h1.textContent : fallbackTitle) + ' — Agents 102';
                        appendNav();
                    })
                    .catch(function (err) {
                        container.innerHTML = '<h1>Could not load</h1><p>' + esc(err.message) + '</p><p><a href="curriculum.html">Back to index</a>.</p>';
                        document.title = 'Load error — Agents 102';
                    });
            }

            // A file can declare its canonical parent module with `<!-- parent: <slug> -->`
            // (invisible HTML comment, usually at the top of the file). When present, the
            // "Back to …" link on the standalone page targets that module instead of the
            // training index. Example in a prework or exercise file:
            //   <!-- parent: building-agent-systems -->
            function extractParent(md) {
                var m = md.match(/<!--\s*parent:\s*([a-zA-Z0-9_-]+)\s*-->/);
                if (m) directFileParent = m[1];
                return md;
            }

            // Everything below a `<!-- maintainer -->` HTML comment on its own line is
            // maintainer metadata — editorial notes, facilitator intel, eval logs, TODO lists —
            // and must not reach the student. Cut it off before rendering. We use an HTML
            // comment rather than `---` as the cut marker because `---` is legitimately used
            // in body prose as a visual horizontal rule (see prework, quick-reference,
            // supplementary files). The HTML comment is invisible in any markdown renderer and
            // only the cut sentinel — no collision risk.
            function stripMaintainerTail(md) {
                var lines = md.split('\n');
                for (var i = 0; i < lines.length; i++) {
                    if (/^<!--\s*maintainer\s*-->\s*$/i.test(lines[i])) {
                        return lines.slice(0, i).join('\n').replace(/\s+$/, '');
                    }
                }
                return md;
            }

            // Bottom nav:
            //   - On a module page: prev module / all modules / next module
            //   - On a standalone exercise/lecture page: back to the training index
            function appendNav() {
                var nav = '';
                if (typeof mod !== 'undefined' && mod) {
                    var i = training.modules.findIndex(function (m) { return m.slug === mod.slug; });
                    var prev = i > 0 ? training.modules[i - 1] : null;
                    var next = i >= 0 && i < training.modules.length - 1 ? training.modules[i + 1] : null;
                    nav += '<nav class="page-nav">';
                    nav += prev
                        ? '<a class="nav-prev" href="curriculum.html?training=' + trainingKey + '&module=' + prev.slug + '">← ' + esc(prev.title) + '</a>'
                        : '<span class="nav-prev nav-empty"></span>';
                    nav += '<a class="nav-home" href="curriculum.html?training=' + trainingKey + '">All modules</a>';
                    nav += next
                        ? '<a class="nav-next" href="curriculum.html?training=' + trainingKey + '&module=' + next.slug + '">' + esc(next.title) + ' →</a>'
                        : '<span class="nav-next nav-empty"></span>';
                    nav += '</nav>';
                } else if (directFile) {
                    nav += '<nav class="page-nav">';
                    nav += '<span class="nav-prev nav-empty"></span>';
                    if (directFileParent) {
                        var parentMod = training.modules.find(function (m) { return m.slug === directFileParent; });
                        var parentTitle = parentMod ? parentMod.title : directFileParent;
                        nav += '<a class="nav-home" href="curriculum.html?training=' + trainingKey + '&module=' + directFileParent + '">← Back to ' + esc(parentTitle) + '</a>';
                    } else {
                        nav += '<a class="nav-home" href="curriculum.html">← Back to curriculum</a>';
                    }
                    nav += '<span class="nav-next nav-empty"></span>';
                    nav += '</nav>';
                }
                if (nav) container.insertAdjacentHTML('beforeend', nav);
            }

            // Expand standalone include links of the form:
            //   [Any text](exercises/slug.md)    or    [Any text](lectures/slug.md)
            // A link is an include only when it is the ENTIRE paragraph (its own line, no surrounding prose).
            // If the file fetch fails, the link is left as-is (renders as a normal link).
            function expandIncludes(md) {
                var re = /^\[([^\]]+)\]\(((?:exercises|lectures)\/[a-z0-9-]+\.md)\)[ \t]*$/gm;
                var matches = [];
                var m;
                while ((m = re.exec(md)) !== null) {
                    matches.push({ full: m[0], path: m[2] });
                }
                if (matches.length === 0) return Promise.resolve(md);

                // Fetch uniques in parallel
                var uniquePaths = Array.from(new Set(matches.map(function (x) { return x.path; })));
                var fetches = uniquePaths.map(function (p) {
                    return fetch('../curriculum/' + p)
                        .then(function (res) { return res.ok ? res.text() : null; })
                        .catch(function () { return null; });
                });

                return Promise.all(fetches).then(function (results) {
                    var map = {};
                    uniquePaths.forEach(function (p, i) { map[p] = results[i]; });
                    matches.forEach(function (mm) {
                        var content = map[mm.path];
                        if (content !== null && content !== undefined) {
                            // Strip maintainer tail so it doesn't bleed into module pages
                            content = stripMaintainerTail(content);
                            // Linkify the first H1 so the included exercise/lecture title
                            // becomes a link to its standalone view.
                            var standalone = mm.path.replace(/\.md$/, '');
                            content = content.replace(/^# (.+)$/m,
                                '# [$1](curriculum.html?file=' + standalone + ')');
                            // Wrap in a phase block so CSS can give exercises vs. lectures
                            // distinct backgrounds — visual rhythm for scrollers.
                            var kind = mm.path.indexOf('exercises/') === 0 ? 'exercise' : 'lecture';
                            var wrapped =
                                '\n\n<section class="phase phase--' + kind + '">\n\n' +
                                '<div class="phase-kicker">' + kind + '</div>\n\n' +
                                content +
                                '\n\n</section>\n\n';
                            md = md.replace(mm.full, wrapped);
                        }
                    });
                    return md;
                });
            }

            function renderTrainingIndex(t) {
                // Split training label at last word to pair it with an oxblood period,
                // echoing the design's "Bootstrap." hero treatment.
                var heroHtml =
                    '<div class="training-hero">' +
                    '  <div class="training-eyebrow">The curriculum</div>' +
                    '  <h1>' + esc(t.label) + '<span class="sep">.</span></h1>' +
                    '  <p class="lede">' + renderAccents(t.lede) + '</p>' +
                    '</div>';

                var sectionsHtml = '';

                if (t.prework) {
                    sectionsHtml +=
                        '<h2 class="index-heading">Before Module 1</h2>' +
                        '<ol class="module-list index-prework" data-big-ideas>' +
                        cardHtml('00', t.prework.title, t.prework.slug, 'curriculum.html?training=' + trainingKey + '&module=' + t.prework.slug) +
                        '</ol>';
                }

                sectionsHtml += '<h2 class="index-heading">The eight modules</h2>';
                sectionsHtml += '<ol class="module-list index-modules" data-big-ideas>';
                t.modules.forEach(function (m, i) {
                    var num = String(i + 1).padStart(2, '0');
                    sectionsHtml += cardHtml(num, m.title, m.slug, 'curriculum.html?training=' + trainingKey + '&module=' + m.slug);
                });
                sectionsHtml += '</ol>';

                if (t.supplementaries && t.supplementaries.length) {
                    sectionsHtml += '<h2 class="index-heading">Supplementary — grows across the training</h2>';
                    sectionsHtml += '<ol class="module-list index-supplementaries">';
                    t.supplementaries.forEach(function (s) {
                        sectionsHtml += simpleRowHtml('Reference', s.title, 'curriculum.html?file=supplementary/' + s.slug);
                    });
                    sectionsHtml += '</ol>';
                }

                if (t.references && t.references.length) {
                    sectionsHtml += '<h2 class="index-heading">Quick reference</h2>';
                    sectionsHtml += '<ol class="module-list index-references">';
                    t.references.forEach(function (r) {
                        sectionsHtml += simpleRowHtml('Lookup', r.title, 'curriculum.html?file=reference/' + r.slug);
                    });
                    sectionsHtml += '</ol>';
                }

                container.innerHTML = heroHtml + sectionsHtml;
                document.title = t.label + ' Curriculum — Agents 102';

                // Hydrate big ideas from each module's markdown so the card gets its
                // one-liner without duplicating content in this file.
                hydrateBigIdeas(t);
            }

            function cardHtml(num, title, slug, href) {
                return '<li data-slug="' + esc(slug) + '">' +
                    '<a href="' + href + '">' +
                    '<span class="module-n">' + esc(num) + '</span>' +
                    '<span class="module-body">' +
                    '<span class="module-title">' + esc(title) + '</span>' +
                    '<span class="module-big" data-big-idea>&nbsp;</span>' +
                    '</span>' +
                    '<span class="module-arrow">→</span>' +
                    '</a></li>';
            }

            function simpleRowHtml(kind, title, href) {
                return '<li><a href="' + href + '">' +
                       '<span class="supp-kind">' + esc(kind) + '</span>' +
                       '<span class="supp-title">' + esc(title) + '</span>' +
                       '<span class="module-arrow">→</span>' +
                       '</a></li>';
            }

            function hydrateBigIdeas(t) {
                var items = [];
                if (t.prework) items.push({ slug: t.prework.slug });
                t.modules.forEach(function (m) { items.push({ slug: m.slug }); });

                items.forEach(function (item) {
                    var path = '../curriculum/trainings/' + trainingKey + '/' + item.slug + '.md';
                    fetch(path)
                        .then(function (res) { return res.ok ? res.text() : null; })
                        .then(function (md) {
                            if (!md) return;
                            var idea = extractBigIdea(md);
                            if (!idea) return;
                            var host = container.querySelector('li[data-slug="' + item.slug + '"] [data-big-idea]');
                            if (host) host.textContent = idea;
                        })
                        .catch(function () { /* leave card without big idea */ });
                });
            }

            // Extract the first non-empty line under "## Big Idea" (up to the next heading).
            function extractBigIdea(md) {
                var m = md.match(/^##\s+Big Idea\s*\n+([\s\S]*?)(?=\n##\s|$)/m);
                if (!m) return null;
                var body = m[1].trim();
                // Take the first paragraph only.
                var firstPara = body.split(/\n\s*\n/)[0].trim();
                // Collapse internal newlines.
                firstPara = firstPara.replace(/\s*\n\s*/g, ' ');
                return firstPara;
            }

            // Turn *word* into a gradient-accented italic span. Escapes everything else.
            function renderAccents(s) {
                return esc(s).replace(/\*([^*]+)\*/g, '<span class="accent">$1</span>');
            }

            function esc(s) {
                return String(s)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }
        })();
    </script>
</body>
</html>
