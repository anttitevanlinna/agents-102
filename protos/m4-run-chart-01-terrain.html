<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>proto 01 · topographic terrain</title>
<style>
  body { margin: 0; padding: 26px 0 40px; background: #f6f1e4; font-family: Inter, system-ui, -apple-system, sans-serif; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
  .strip { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
  .strip .id { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; letter-spacing: 2.5px; color: #8a3a2a; }
  .strip .name { font-family: "Roboto Slab", Georgia, serif; font-size: 15.5px; color: #1f1a13; }
  .strip .desc { font-size: 11.5px; color: #4a4234; }
  svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="wrap">
  <div class="strip">
    <span class="id">PROTO 01 · TOPOGRAPHIC TERRAIN</span>
    <span class="name">One run, drawn</span>
    <span class="desc">A classical terrain chart: the whole journey and its hazards read first. Checks collapse drift; fences stand only at the irreversible edges.</span>
  </div>

<svg viewBox="0 0 1200 560" role="img" aria-label="One agent run drawn as a journey across terrain: a start flag lower left, the destination spot on a summit upper right, a corrected teal path whose drift band widens between checks and collapses at each check, a fenced ravine at the irreversible edge, and an unchecked ghost path drifting into the weeds toward a confident wrong spot." style="display:block;width:100%;height:auto;background:#efe6d2;border:1px solid #c5b68d;border-radius:7px;">
<defs>
  <pattern id="t1-hatch" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="7" stroke="#a05a2c" stroke-width="0.9" opacity="0.3"/>
  </pattern>
  <g id="t1-tuft" stroke="#786c56" stroke-width="1" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M-6,0 h12 M-4,-1 l-2,-6 M0,0 l0,-7 M4,-1 l2,-6"/>
  </g>
  <g id="t1-grass" stroke="#b5a67e" stroke-width="1" fill="none" opacity="0.8" stroke-linecap="round">
    <path d="M-3,0 l-1,-5 M2,0 l1,-5"/>
  </g>
</defs>

<rect x="0.5" y="0.5" width="1199" height="559" rx="7" fill="#efe6d2"/>
<!-- neatline -->
<rect x="12" y="12" width="1176" height="536" fill="none" stroke="#d6c8a3" stroke-width="1" opacity="0.9"/>

<!-- ===== terrain: contour lines ===== -->
<g fill="none" stroke="#d6c8a3" stroke-width="1" opacity="0.75">
  <!-- broad country contours -->
  <path d="M12,340 C120,318 210,338 290,318 C360,300 400,258 470,250"/>
  <path d="M12,395 C140,372 250,392 340,368 C430,344 470,306 545,300"/>
  <path d="M60,548 C120,500 250,510 340,538"/>
  <path d="M12,470 C80,452 150,458 210,476"/>
  <path d="M660,548 C720,520 800,516 860,536"/>
  <path d="M848,340 C915,318 982,328 1042,310 C1102,292 1142,260 1188,254"/>
  <path d="M900,392 C980,368 1080,372 1188,330"/>
  <!-- contours squeezing north of the ravine -->
  <path d="M400,46 C520,32 660,34 760,52"/>
  <path d="M360,34 C500,18 700,20 820,40"/>
</g>
<g fill="none" stroke="#cbbd98" stroke-width="1" opacity="0.6">
  <path d="M12,430 C110,410 220,424 310,402 C400,380 450,342 520,336"/>
  <path d="M760,548 C830,500 960,496 1060,530"/>
</g>

<!-- summit contours around the spot -->
<g fill="none" stroke="#cbbd98" stroke-width="1" opacity="0.85">
  <path d="M1035,100 C1055,102 1053,130 1034,133 C1015,130 1015,103 1035,100 Z"/>
  <path d="M1035,84 C1070,88 1073,140 1036,148 C1000,144 997,90 1035,84 Z"/>
  <path d="M1035,66 C1092,72 1094,158 1038,166 C980,160 974,74 1035,66 Z"/>
</g>

<!-- ===== the ravine: irreversible edge, hatched, fenced ===== -->
<path d="M380,64 C470,48 620,52 720,68 C790,80 814,112 798,134 C742,158 560,160 460,148 C400,140 362,88 380,64 Z"
      fill="url(#t1-hatch)" stroke="#a05a2c" stroke-width="1" opacity="0.75"/>
<!-- cliff hachures along the south rim -->
<path d="M424,144 l3,-9 M456,148 l3,-9 M490,151 l3,-9 M524,153 l3,-9 M558,154 l2,-9 M592,154 l2,-9 M626,153 l2,-9 M660,151 l2,-9 M694,148 l3,-9 M728,144 l3,-9 M760,138 l4,-8 M788,128 l5,-7"
      stroke="#a05a2c" stroke-width="1" opacity="0.55" fill="none"/>
<text x="588" y="99" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#a05a2c" opacity="0.9">THE RAVINE</text>
<text x="588" y="114" text-anchor="middle" font-family="Inter, sans-serif" font-size="10.5" fill="#4a4234" opacity="0.85">no climbing back out</text>

<!-- fence along the rim -->
<g stroke="#a05a2c" fill="none">
  <path d="M392,190 C500,200 640,196 806,172" stroke-width="1.6" opacity="0.9"/>
  <path d="M420,193 l0,-9 M468,196 l0,-9 M516,197 l0,-9 M564,197 l0,-9 M612,196 l0,-9 M660,193 l0,-9 M708,189 l0,-9 M756,183 l0,-9 M796,176 l0,-9" stroke-width="1.4" opacity="0.9"/>
</g>
<text x="376" y="182" text-anchor="end" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#a05a2c">RAILS</text>
<text x="376" y="197" text-anchor="end" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">where damage can't be undone</text>

<!-- ===== open ground: reversible, unfenced ===== -->
<g>
  <use href="#t1-grass" x="205" y="500"/><use href="#t1-grass" x="248" y="514"/><use href="#t1-grass" x="296" y="498"/><use href="#t1-grass" x="336" y="520"/><use href="#t1-grass" x="180" y="528"/>
</g>
<text x="255" y="527" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#786c56">OPEN GROUND</text>
<text x="255" y="542" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4a4234" opacity="0.85">cheap to cross, cheap to redo</text>

<!-- ===== the weeds: bottom right marsh ===== -->
<g>
  <use href="#t1-tuft" x="892" y="446"/><use href="#t1-tuft" x="948" y="430"/><use href="#t1-tuft" x="1010" y="440"/><use href="#t1-tuft" x="1080" y="452"/><use href="#t1-tuft" x="1136" y="472"/>
  <use href="#t1-tuft" x="910" y="500"/><use href="#t1-tuft" x="960" y="530"/><use href="#t1-tuft" x="1046" y="544"/><use href="#t1-tuft" x="1168" y="472"/><use href="#t1-tuft" x="874" y="536"/>
</g>
<text x="872" y="428" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#786c56">THE WEEDS</text>

<!-- ===== the bearing: faint straight line ===== -->
<line x1="110" y1="468" x2="1035" y2="118" stroke="#cbbd98" stroke-width="1" stroke-dasharray="2 7" opacity="0.65"/>
<text x="208" y="424" transform="rotate(-20.7 208 424)" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="8.5" letter-spacing="2" fill="#786c56" opacity="0.6">THE BEARING</text>

<!-- ===== ghost drift cone (no checks: spread never resets) ===== -->
<path d="M330,432 C420,486 600,514 820,512 C900,510 970,518 1006,526 Q1030,478 1018,430 C900,428 600,450 330,432 Z"
      fill="#786c56" opacity="0.08" stroke="#786c56" stroke-opacity="0.22" stroke-width="0.7"/>
<path d="M1006,526 Q1030,478 1018,430" fill="none" stroke="#786c56" stroke-width="1" stroke-dasharray="1.5 4" opacity="0.5"/>

<!-- ===== drift cones for the corrected run (reset at each check) ===== -->
<g fill="#2f6b6b" opacity="0.12" stroke="#2f6b6b" stroke-opacity="0.28" stroke-width="0.7">
  <path d="M110,468 C192,473 274,468 337,451 Q341,428 323,413 C256,444 182,461 110,468 Z"/>
  <path d="M330,432 C380,362 462,285 569,253 Q572,224 551,204 C434,254 364,342 330,432 Z"/>
  <path d="M560,228 C634,264 718,294 794,288 Q803,260 786,236 C712,254 632,250 560,228 Z"/>
  <path d="M790,262 C838,218 910,174 963,161 Q970,139 953,123 C890,144 822,198 790,262 Z"/>
</g>
<!-- possible-position fan just before each check -->
<g fill="none" stroke="#2f6b6b" stroke-width="1.1" stroke-dasharray="1.5 3.5" opacity="0.6">
  <path d="M337,451 Q341,428 323,413"/>
  <path d="M569,253 Q572,224 551,204"/>
  <path d="M794,288 Q803,260 786,236"/>
  <path d="M963,161 Q970,139 953,123"/>
</g>

<!-- ===== ghost path: same run, never corrected ===== -->
<path d="M330,432 C430,470 560,486 690,472 C800,460 920,468 1008,478"
      fill="none" stroke="#786c56" stroke-width="1.8" stroke-dasharray="5 6" stroke-linecap="round" opacity="0.5"/>
<!-- ghost wrong-spot X -->
<g stroke="#786c56" stroke-width="2.2" stroke-linecap="round" opacity="0.8">
  <path d="M1005,471 L1019,485 M1019,471 L1005,485"/>
</g>
<text x="540" y="505" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#786c56">NO CHECKS</text>
<text x="540" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#786c56">same run, never corrected</text>
<text x="1090" y="505" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#786c56">THE WRONG SPOT</text>
<text x="1090" y="524" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15" fill="#786c56">Done, it says.</text>

<!-- ===== the corrected run ===== -->
<g fill="none" stroke="#2f6b6b" stroke-linecap="round" stroke-linejoin="round">
  <path d="M110,468 C180,468 262,458 330,432" stroke-width="2.6" opacity="0.92"/>
  <path d="M330,432 C372,352 448,268 560,228" stroke-width="2.6" opacity="0.92"/>
  <path d="M560,228 C640,258 720,272 790,262" stroke-width="2.6" opacity="0.92"/>
  <path d="M790,262 C830,208 900,158 958,142" stroke-width="2.6" opacity="0.92"/>
  <path d="M958,142 C985,132 1010,124 1032,119" stroke-width="2.6" opacity="0.92"/>
</g>
<!-- direction cues -->
<g fill="#2f6b6b">
  <polygon points="232,459 218,456 222,468"/>
  <polygon points="672,266 658,258 659,271"/>
</g>
<polygon points="925,466 911,462 914,474" fill="#786c56" opacity="0.7"/>

<!-- check marks: circled, path kinks back toward the bearing -->
<g>
  <circle cx="330" cy="432" r="7.5" fill="#efe6d2" stroke="#2f6b6b" stroke-width="1.6"/>
  <circle cx="560" cy="228" r="7.5" fill="#efe6d2" stroke="#2f6b6b" stroke-width="1.6"/>
  <circle cx="790" cy="262" r="7.5" fill="#efe6d2" stroke="#2f6b6b" stroke-width="1.6"/>
  <circle cx="958" cy="142" r="7.5" fill="#efe6d2" stroke="#2f6b6b" stroke-width="1.6"/>
  <g text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#2f6b6b">
    <text x="330" y="435.5">✓</text><text x="560" y="231.5">✓</text><text x="790" y="265.5">✓</text><text x="958" y="145.5">✓</text>
  </g>
</g>

<!-- check label at third check -->
<text x="820" y="308" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#2f6b6b">A CHECK</text>
<text x="820" y="323" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">drift collapses, bearing resets</text>

<!-- drift label with leader to the second cone -->
<line x1="640" y1="326" x2="682" y2="274" stroke="#786c56" stroke-width="0.8" opacity="0.5"/>
<text x="640" y="338" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#2f6b6b" opacity="0.85">DRIFT</text>
<text x="640" y="353" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">grows with distance since the last check</text>

<!-- ===== start ===== -->
<circle cx="110" cy="468" r="3.2" fill="#1f1a13"/>
<path d="M110,468 L110,441" stroke="#1f1a13" stroke-width="1.4"/>
<polygon points="110,441 129,446 110,452" fill="#2f6b6b"/>
<text x="110" y="490" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#1f1a13">START</text>
<text x="110" y="505" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">task in hand</text>

<!-- ===== the spot ===== -->
<polygon points="1035,108 1043,122 1027,122" fill="#a05a2c"/>
<text x="1035" y="190" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#a05a2c">THE SPOT</text>
<text x="1035" y="212" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="17" fill="#1f1a13">Done, defined.</text>
<text x="1035" y="229" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">named before the start</text>

<!-- ===== cartouche ===== -->
<g>
  <rect x="120" y="44" width="218" height="54" fill="#efe6d2" stroke="#c5b68d" stroke-width="1"/>
  <rect x="124" y="48" width="210" height="46" fill="none" stroke="#d6c8a3" stroke-width="1"/>
  <text x="140" y="70" font-family="Roboto Slab, Georgia, serif" font-size="15.5" fill="#1f1a13">One run, drawn</text>
  <text x="140" y="87" font-family="Inter, sans-serif" font-size="11" fill="#4a4234">checks reset the drift</text>
</g>

<!-- ===== compass rose ===== -->
<g opacity="0.75">
  <circle cx="66" cy="80" r="14" fill="none" stroke="#4a4234" stroke-width="0.8"/>
  <polygon points="66,60 69.5,80 66,86 62.5,80" fill="#4a4234"/>
  <polygon points="66,100 69.5,80 66,74 62.5,80" fill="none" stroke="#4a4234" stroke-width="0.7"/>
  <text x="66" y="52" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9" fill="#4a4234">N</text>
</g>
</svg>
</div>
</body>
</html>
