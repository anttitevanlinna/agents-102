<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proto C2 · Open vs Closed</title>
<style>
  body{margin:0;background:#f4eee0;font-family:ui-monospace,Menlo,Consolas,monospace;}
  .wrap{max-width:1240px;margin:0 auto;padding:18px 20px 40px;}
  .hd{background:#1f1a13;color:#efe6d2;font-size:11px;letter-spacing:1px;padding:9px 14px;border-radius:4px;margin-bottom:14px;display:flex;gap:16px;align-items:baseline;flex-wrap:wrap;}
  .hd .id{color:#c97942;letter-spacing:3px;white-space:nowrap;}
  .hd .nm{white-space:nowrap;}
  .hd .st{color:#a99d85;font-family:Inter,-apple-system,sans-serif;letter-spacing:0;font-size:11.5px;}
</style>
</head>
<body>
<div class="wrap">
<div class="hd">
  <span class="id">PROTO C2</span>
  <span class="nm">OPEN vs CLOSED · THE SENSOR IS THE DIFFERENCE</span>
  <span class="st">Open-loop vs closed-loop, side by side. The only thing added in the lower panel is the measurement return (tests/judge/gate) that lets the system feel its own error. That return is what control theory calls closing the loop.</span>
</div>
<svg viewBox="0 0 1200 560" role="img" aria-label="Two stacked panels contrasting an open loop and a closed loop. The top panel, drawn ghosted and grey, runs a single left-to-right chain from the spec through the agent run to the change, with no return path, ending at a rust cross marking a wrong result. The lower panel, drawn solid and teal, runs the same chain but adds a return arc from the change down through a highlighted sensor node labelled tests, judge and gate, back to a compare junction, closing the loop and arriving at a defined target." style="display:block;width:100%;height:auto;background:#efe6d2;border:1px solid #c5b68d;border-radius:7px;">

<rect x="0.5" y="0.5" width="1199" height="559" rx="7" fill="#efe6d2"/>
<!-- neatline -->
<rect x="12" y="12" width="1176" height="536" fill="none" stroke="#d6c8a3" stroke-width="1" opacity="0.9"/>

<!-- ===================================================== -->
<!-- TOP PANEL : OPEN LOOP  (ghosted, grey-brown, dashed)  -->
<!-- ===================================================== -->
<g opacity="0.55" fill="none" stroke="#786c56" stroke-linecap="round">
  <!-- panel tag -->
  <text x="62" y="128" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" letter-spacing="3" fill="#786c56" stroke="none">OPEN LOOP</text>

  <!-- the spec (node) -->
  <circle cx="150" cy="168" r="4.5" fill="#786c56" stroke="none"/>
  <text x="150" y="197" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#786c56" stroke="none">THE SPEC</text>

  <!-- arrow: spec to run -->
  <line x1="160" y1="168" x2="420" y2="168" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="422,168 411,163 411,173" fill="#786c56" stroke="none"/>

  <!-- the agent run (block) -->
  <rect x="430" y="140" width="210" height="56" rx="8" fill="#efe6d2" stroke="#786c56" stroke-width="2" stroke-dasharray="5 5"/>
  <text x="535" y="165" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#786c56" stroke="none">THE AGENT RUN</text>
  <text x="535" y="182" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#786c56" stroke="none">one send-off</text>

  <!-- arrow: run to change -->
  <line x1="640" y1="168" x2="816" y2="168" stroke-width="2" stroke-dasharray="5 5"/>
  <polygon points="818,168 807,163 807,173" fill="#786c56" stroke="none"/>

  <!-- the change (node) -->
  <circle cx="850" cy="168" r="4.5" fill="#786c56" stroke="none"/>
  <text x="850" y="197" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#786c56" stroke="none">THE CHANGE</text>

  <!-- trailing line into the wrong end -->
  <line x1="856" y1="168" x2="986" y2="168" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- open-loop thesis -->
  <text x="535" y="228" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2.5" fill="#786c56" stroke="none">SEND THE WORK OFF AND HOPE</text>
  <text x="535" y="244" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#786c56" stroke="none">no way to read its own result</text>
</g>

<!-- wrong end : rust X + caption (stands out of the ghost) -->
<g stroke="#8a3a2a" stroke-width="2.6" stroke-linecap="round" opacity="0.92">
  <path d="M992,158 L1012,178"/>
  <path d="M1012,158 L992,178"/>
</g>
<text x="1002" y="209" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="16" fill="#8a3a2a" opacity="0.95">Confident, and wrong.</text>

<!-- ===================================================== -->
<!-- DIVIDER : the one thing added                         -->
<!-- ===================================================== -->
<line x1="40" y1="280" x2="1160" y2="280" stroke="#cbbd98" stroke-width="1" stroke-dasharray="6 6"/>
<text x="600" y="274" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10" letter-spacing="2.5" fill="#a05a2c" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">SAME CHAIN, ONE THING ADDED</text>
<polygon points="594,290 606,290 600,299" fill="#2f6b6b"/>

<!-- ===================================================== -->
<!-- BOTTOM PANEL : CLOSED LOOP  (solid, teal)             -->
<!-- ===================================================== -->

<!-- panel tag -->
<text x="62" y="322" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" letter-spacing="3" fill="#2f6b6b">CLOSED LOOP</text>

<!-- the return arc (drawn first, nodes sit on top) -->
<path d="M850,366 C850,456 838,500 748,500 L316,500 C250,500 230,470 230,386"
      fill="none" stroke="#2f6b6b" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
<!-- return flows leftward into the sensor -->
<polygon points="600,500 611,495 611,505" fill="#2f6b6b"/>
<!-- return arrives up into the compare junction -->
<polygon points="230,375 225,387 235,387" fill="#2f6b6b"/>

<!-- forward chain arrows -->
<g stroke="#2f6b6b" stroke-width="2.2" stroke-linecap="round" fill="none">
  <line x1="157" y1="360" x2="212" y2="360"/>
  <line x1="243" y1="360" x2="426" y2="360"/>
  <line x1="640" y1="360" x2="840" y2="360"/>
  <line x1="858" y1="360" x2="983" y2="360"/>
</g>
<g fill="#2f6b6b">
  <polygon points="214,360 203,355 203,365"/>
  <polygon points="428,360 417,355 417,365"/>
  <polygon points="842,360 831,355 831,365"/>
  <polygon points="985,360 974,355 974,365"/>
</g>

<!-- the spec (node) -->
<circle cx="150" cy="360" r="4.5" fill="#2f6b6b"/>
<text x="150" y="343" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#2f6b6b">THE SPEC</text>

<!-- compare junction -->
<circle cx="230" cy="360" r="13" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2"/>
<line x1="222" y1="360" x2="238" y2="360" stroke="#2f6b6b" stroke-width="1.6"/>
<line x1="230" y1="352" x2="230" y2="368" stroke="#2f6b6b" stroke-width="1.6"/>
<text x="232" y="343" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9.5" letter-spacing="2" fill="#2f6b6b">COMPARE</text>

<!-- the agent run (block) -->
<rect x="430" y="332" width="210" height="56" rx="8" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2.2"/>
<text x="535" y="357" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="2" fill="#2f6b6b">THE AGENT RUN</text>
<text x="535" y="374" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10" fill="#4a4234">the same run</text>

<!-- the change (node) -->
<circle cx="850" cy="360" r="4.5" fill="#2f6b6b"/>
<text x="850" y="343" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#2f6b6b">THE CHANGE</text>

<!-- the target : the spot, defined -->
<g fill="none" stroke="#a05a2c">
  <circle cx="1005" cy="360" r="16" stroke-width="2"/>
  <circle cx="1005" cy="360" r="9" stroke-width="1.8"/>
</g>
<circle cx="1005" cy="360" r="3.5" fill="#a05a2c"/>
<text x="1005" y="336" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="10.5" letter-spacing="2.5" fill="#a05a2c">THE SPOT</text>
<text x="1005" y="393" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="10.5" fill="#4a4234">defined before the run</text>
<text x="1005" y="414" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="15" fill="#1f1a13">Checked, and right.</text>

<!-- loop-interior payoff -->
<text x="650" y="428" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11" letter-spacing="1.5" fill="#2f6b6b" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">THE SYSTEM CAN FEEL ERROR AND RESPOND</text>
<text x="650" y="444" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234" paint-order="stroke" stroke="#efe6d2" stroke-width="3" stroke-linejoin="round">the loop is closed</text>

<!-- the sensor : the highlighted node -->
<rect x="398" y="479" width="168" height="42" rx="9" fill="none" stroke="#a05a2c" stroke-width="2"/>
<rect x="402" y="483" width="160" height="34" rx="7" fill="#efe6d2" stroke="#2f6b6b" stroke-width="2.4"/>
<text x="482" y="497" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="12" letter-spacing="2" fill="#2f6b6b">THE SENSOR</text>
<text x="482" y="512" text-anchor="middle" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9.5" letter-spacing="2" fill="#a05a2c">TESTS · JUDGE · GATE</text>
<text x="482" y="537" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">reads the result, catches the error</text>

<!-- bottom thesis caption -->
<text x="898" y="542" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-style="italic" font-size="14" fill="#4a4234">A run with no verifier runs open. The check closes the loop.</text>

<!-- ===================================================== -->
<!-- CARTOUCHE (top-left)                                  -->
<!-- ===================================================== -->
<rect x="42" y="24" width="286" height="74" fill="none" stroke="#cbbd98" stroke-width="1"/>
<text x="58" y="46" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="9.5" letter-spacing="3" fill="#8a3a2a">TWO WAYS TO RUN</text>
<text x="58" y="69" font-family="Roboto Slab, Georgia, serif" font-size="15.5" fill="#1f1a13">Open, or closed</text>
<text x="58" y="89" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#4a4234">the sensor is the difference</text>

</svg>
</div>
</body>
</html>
