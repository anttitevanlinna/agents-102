# acme-gate — Cloudflare Worker that puts HTTP Basic Auth in front of the acme
# beta workbook served from GitHub Pages via agents102.bosser.consulting.
#
#   Deploy:  wrangler deploy                  (from this directory)
#   Login:   acme / agentic   (baked-in default — a public speed bump, not a secret)
#   Real pw: wrangler secret put ACME_PASSWORD   (optional; overrides the default)
#   Remove:  wrangler delete                  (drops the Worker + route)
#
# The route pattern below IS the entire "only for acme" scoping — nothing else
# on the bosser.consulting zone is touched. The gate covers the customer hub,
# both AE101 trainings (preview + full), and the ae101-content.tar.gz payload
# under /clients/acme/.

name = "acme-gate"
main = "worker.js"
compatibility_date = "2026-07-01"

# Bind to the Pages host path. `/clients/acme/*` matches the hub, both trainings
# and the tarball. A bare `/clients/acme` (no slash) 301s to `/clients/acme/`
# at the origin and is then gated, so no content leaks.
routes = [
  { pattern = "agents102.bosser.consulting/clients/acme/*", zone_name = "bosser.consulting" }
]

# The login password defaults to "agentic" (baked into worker.js — a public
# speed bump, not a secret). To use a real password, set an ACME_PASSWORD Worker
# secret; it overrides the default with no code change. The login name defaults
# to "acme" (override with an ACME_USERNAME var/secret).
